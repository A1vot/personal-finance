{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center">
      <img src="{% static 'favicon.svg' %}" 
            alt="Logo" 
            width="26" 
            height="26" 
            class="me-2">
      Финансы
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!--- Навигация для авторизованных -->
    <div class="collapse navbar-collapse" id="navbarNav">
      {% if user.is_authenticated %}
        <ul class="navbar-nav ms-auto d-flex align-items-center">

          <li class="nav-item">
            <span class="navbar-brand mb-0 h1 me-4" style="font-weight:375; position:relative; top:1px;">
                Личный кабинет: {{ user.username }}
            </span>
          </li>

          <li class="nav-item me-4">
            <form action="/logout/" method="post" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="navbar-brand btn p-0 m-0" style="border:none;">
                  Выйти
              </button>
            </form>
          </li>

          <li class="nav-item">
            <a class="navbar-brand" style="cursor:pointer;" data-bs-toggle="modal" data-bs-target="#helpUserModal">
              Помощь
            </a>
          </li>

        </ul>
      {% endif %}

      <!--- Навигация для неавторизованных -->
      {% if not user.is_authenticated %}
        <ul class="navbar-nav ms-auto d-flex align-items-center">

          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#helpModal">
              Справка
            </button>
          </li>

        </ul>
      {% endif %}

    </div>
  </div>
</nav>
