<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <h1>Вход</h1>

    <form method="post">
        {% csrf_token %}
        <label>Логин:</label>
        <input type="text" name="username">

        <label>Пароль:</label>
        <input type="password" name="password">

        <button type="submit">Войти</button>
    </form>

    <br>

    <a href="/register/">Зарегистрироваться</a>
</body>
</html>
